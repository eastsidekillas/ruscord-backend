version: "3.9"

# Запускает только инфраструктуру (Redis + PostgreSQL) для локальной разработки.
# Django запускается отдельно: python manage.py runserver
#
# Использование:
#   docker-compose -f docker-compose.dev.yml up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ruscord
      POSTGRES_PASSWORD: ruscord
      POSTGRES_DB: ruscord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: